<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beni Aç</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --paper: #f6d8de;
      --paper-dark: #d79aa6;
      --paper-line: rgba(122, 52, 70, 0.18);
      --text: #7a3446;
      --bg1: #fff4f6;
      --bg2: #ffe7ec;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.75), transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      font-family: "Georgia", "Times New Roman", serif;
      overflow: hidden;
    }

    .scene {
      width: 100%;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      perspective: 1600px;
    }

    .card-wrap {
      position: relative;
      width: 360px;
      height: 330px;
      cursor: pointer;
      transform-style: preserve-3d;
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 22px 28px rgba(112, 57, 74, 0.18));
    }

    .heart {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 220px;
      height: 220px;
      transform: translate(-50%, -50%) rotate(-45deg);
      transition: transform 1s ease, filter 1s ease;
    }

    .heart-piece {
      position: absolute;
      background:
        linear-gradient(145deg, #fce8ec 0%, #f2c8d1 40%, #eab1bd 100%);
      border: 1.5px solid rgba(122, 52, 70, 0.12);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.55),
        inset 0 -8px 18px rgba(122, 52, 70, 0.08),
        inset 8px 0 18px rgba(255,255,255,0.12);
      overflow: hidden;
    }

    .heart-piece::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          transparent 0 11px,
          rgba(122, 52, 70, 0.03) 11px 12px
        ),
        repeating-linear-gradient(
          90deg,
          transparent 0 13px,
          rgba(255,255,255,0.06) 13px 14px
        );
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    .heart-piece::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.22), transparent 32%);
      pointer-events: none;
    }

    .heart-center {
      width: 155px;
      height: 155px;
      left: 33px;
      bottom: 12px;
      border-radius: 18px 18px 28px 18px;
    }

    .heart-left,
    .heart-right {
      width: 155px;
      height: 155px;
      border-radius: 50%;
      top: 0;
    }

    .heart-left { left: 0; }
    .heart-right { right: 0; }

    .crease {
      position: absolute;
      background: rgba(122, 52, 70, 0.14);
      z-index: 5;
      border-radius: 999px;
      box-shadow: 0 0 8px rgba(255,255,255,0.12);
    }

    .crease-v {
      width: 2px;
      height: 155px;
      left: 50%;
      top: 36px;
      transform: translateX(-50%) rotate(45deg);
    }

    .crease-h {
      width: 160px;
      height: 2px;
      left: 31px;
      top: 50%;
      transform: rotate(45deg);
    }

    .crumple {
      position: absolute;
      border-radius: 50%;
      background: rgba(122, 52, 70, 0.07);
      filter: blur(0.2px);
      z-index: 4;
    }

    .c1 { width: 24px; height: 18px; top: 70px; left: 54px; transform: rotate(18deg); }
    .c2 { width: 22px; height: 14px; top: 110px; right: 58px; transform: rotate(-22deg); }
    .c3 { width: 18px; height: 12px; bottom: 58px; left: 98px; transform: rotate(12deg); }
    .c4 { width: 28px; height: 16px; bottom: 78px; right: 92px; transform: rotate(-16deg); }

    .label {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 6;
      transform: rotate(45deg);
      text-align: center;
      color: var(--text);
      font-size: 31px;
      font-weight: 700;
      letter-spacing: 0.5px;
      user-select: none;
      text-shadow: 0 1px 0 rgba(255,255,255,0.45);
      transition: opacity .5s ease;
    }

    .message {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 46px;
      text-align: center;
      color: var(--text);
      font-size: 27px;
      line-height: 1.35;
      font-weight: 700;
      transform: rotate(45deg) scale(0.86);
      opacity: 0;
      transition: opacity .9s ease .15s, transform .9s ease .15s;
      z-index: 6;
      text-shadow: 0 1px 0 rgba(255,255,255,0.4);
    }

    .hint {
      position: absolute;
      bottom: -34px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      color: #9c6170;
      letter-spacing: .2px;
      user-select: none;
    }

    .sparkles {
      position: absolute;
      inset: -20px;
      pointer-events: none;
    }

    .sparkles span {
      position: absolute;
      font-size: 16px;
      opacity: 0;
      animation: sparkle 4.6s linear infinite;
    }

    .sparkles span:nth-child(1) { top: 15%; left: 18%; animation-delay: 0s; }
    .sparkles span:nth-child(2) { top: 14%; right: 17%; animation-delay: .9s; }
    .sparkles span:nth-child(3) { bottom: 18%; left: 16%; animation-delay: 1.8s; }
    .sparkles span:nth-child(4) { bottom: 15%; right: 20%; animation-delay: 2.7s; }

    .opened .label {
      opacity: 0;
    }

    .opened .message {
      opacity: 1;
      transform: rotate(45deg) scale(1);
    }

    .opened .heart-left {
      transform: translateX(-18px) rotate(-9deg);
    }

    .opened .heart-right {
      transform: translateX(18px) rotate(9deg);
    }

    .opened .heart-center {
      transform: translateY(10px);
    }

    .opened .heart {
      filter: saturate(1.02);
    }

    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    @keyframes sparkle {
      0% { opacity: 0; transform: translateY(10px) scale(.6); }
      20% { opacity: 1; }
      60% { opacity: 1; transform: translateY(-8px) scale(1); }
      100% { opacity: 0; transform: translateY(-18px) scale(.7); }
    }

    @media (max-width: 480px) {
      .card-wrap {
        width: 300px;
        height: 285px;
      }

      .heart {
        width: 185px;
        height: 185px;
      }

      .heart-center,
      .heart-left,
      .heart-right {
        width: 132px;
        height: 132px;
      }

      .heart-center {
        left: 27px;
        bottom: 10px;
      }

      .crease-v {
        height: 130px;
        top: 29px;
      }

      .crease-h {
        width: 136px;
        left: 26px;
      }

      .label {
        font-size: 25px;
      }

      .message {
        font-size: 22px;
        padding: 38px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="card-wrap" id="card">
      <div class="sparkles">
        <span>✦</span>
        <span>✧</span>
        <span>✦</span>
        <span>✧</span>
      </div>

      <div class="heart">
        <div class="heart-piece heart-left"></div>
        <div class="heart-piece heart-right"></div>
        <div class="heart-piece heart-center"></div>

        <div class="crease crease-v"></div>
        <div class="crease crease-h"></div>

        <div class="crumple c1"></div>
        <div class="crumple c2"></div>
        <div class="crumple c3"></div>
        <div class="crumple c4"></div>

        <div class="label">beni aç</div>
        <div class="message">bu hayat seninle daha anlamlı</div>
      </div>

      <div class="hint">Kalbe tıkla</div>
    </div>
  </div>

  <script>
    const card = document.getElementById('card');
    card.addEventListener('click', () => {
      card.classList.toggle('opened');
    });
  </script>
</body>
</html>
