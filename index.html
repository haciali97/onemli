<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beni Aç</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg1: #fbf2f4;
      --bg2: #f3dbe2;
      --paperA: #efc7d0;
      --paperB: #e7b1bf;
      --paperInsideA: #f9e1e7;
      --paperInsideB: #f3ccd6;
      --stroke: rgba(120, 63, 78, 0.16);
      --crease: rgba(120, 63, 78, 0.12);
      --text: #7b4152;
      --shadow: rgba(109, 61, 75, 0.16);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.88), transparent 24%),
        radial-gradient(circle at 80% 10%, rgba(255,255,255,0.55), transparent 18%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
    }

    .scene {
      width: 100%;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrap {
      position: relative;
      width: min(92vw, 430px);
      height: min(92vh, 540px);
      display: grid;
      place-items: center;
      cursor: pointer;
      animation: float 4.8s ease-in-out infinite;
    }

    .heart-stage {
      position: relative;
      width: min(78vw, 320px);
      aspect-ratio: 1 / 1;
      filter: drop-shadow(0 24px 28px var(--shadow));
    }

    .heart-svg {
      position: absolute;
      inset: 0;
      overflow: visible;
    }

    .shell,
    .inner,
    .left-flap,
    .right-flap,
    .bottom-fold {
      transition: transform 1s cubic-bezier(.22,.84,.24,1), opacity .8s ease;
      transform-box: fill-box;
      transform-origin: center;
    }

    .inner {
      opacity: .9;
      transform: scale(.91);
    }

    .label,
    .message {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 58px;
      color: var(--text);
      z-index: 4;
      user-select: none;
      text-shadow: 0 1px 0 rgba(255,255,255,.35);
    }

    .label {
      font-size: clamp(28px, 5vw, 38px);
      font-weight: 700;
      letter-spacing: .3px;
      transition: opacity .45s ease;
    }

    .message {
      font-size: clamp(19px, 3.6vw, 27px);
      line-height: 1.28;
      font-weight: 700;
      opacity: 0;
      transform: scale(.86);
      transition: opacity .85s ease .12s, transform 1s cubic-bezier(.22,.84,.24,1) .12s;
    }

    .hint {
      position: absolute;
      bottom: 18px;
      width: 100%;
      text-align: center;
      color: #986271;
      font-size: 14px;
      letter-spacing: .2px;
      user-select: none;
    }

    .opened .label { opacity: 0; }
    .opened .message { opacity: 1; transform: scale(1); }
    .opened .inner { opacity: 1; transform: scale(.97) translateY(1px); }
    .opened .left-flap { transform: rotate(-16deg) translate(-14px, -6px); }
    .opened .right-flap { transform: rotate(16deg) translate(14px, -6px); }
    .opened .bottom-fold { transform: translateY(8px); }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="wrap" id="card" aria-label="Kalp mektup">
      <div class="heart-stage">

          </defs>

          <g class="inner">

              <ellipse cx="108" cy="123" rx="16" ry="7" fill="rgba(125,70,86,0.05)" transform="rotate(-18 108 123)"/>

          <g class="left-flap">

                       C155 68, 157 72, 160 77
                       C156 89, 150 101, 140 113

          <g class="right-flap">
            <g clip-path="url(#rightTopClip)">
              <path d="M160 274

                       C283 164, 300 126, 299 91

                       C211 25, 185 40, 169 63
                       C165 68, 163 72, 160 77
                       C164 89, 170 101, 180 113
                       C198 134, 225 152, 258 173
                       C228 143, 198 116, 160 77 Z"
                    fill="url(#paperGrad)"

                    stroke-width="1.2"/>
              <path d="M161 78 C176 101, 192 121, 218 139 C233 149, 246 157, 259 166"
                    fill="none" stroke="rgba(120,63,78,0.12)" stroke-width="1.4" stroke-linecap="round"/>
            </g>
          </g>

          <g class="bottom-fold">
            <g clip-path="url(#bottomClip)">
              <path d="M56 171
                       C83 195, 117 220, 160 267
                       C203 220, 237 195, 264 171
                       C231 150, 194 126, 160 101

              <path d="M69 171 C98 154, 129 129, 160 101 C191 129, 222 154, 251 171"

          </g>
        </svg>

        <div class="label">beni aç</div>
        <div class="message">seni 14 milyon 600 bin 800 kere seviyorum</div>
      </div>

      <div class="hint">Kalbe tıkla</div>
    </div>
  </div>

  <script>
    const card = document.getElementById('card');
    card.addEventListener('click', () => {
      card.classList.toggle('opened');
    });
  </script>
</body>
</html>
