<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beni Aç</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffd6e7, #fff0f6, #ffe3ec);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .scene {
      perspective: 1600px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 24px;
    }

    .card-wrap {
      position: relative;
      width: 340px;
      height: 340px;
      cursor: pointer;
      transform-style: preserve-3d;
      animation: float 3.5s ease-in-out infinite;
    }

    .heart-closed {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.7s ease, transform 0.7s ease;
      z-index: 3;
    }

    .heart-shape {
      position: relative;
      width: 180px;
      height: 160px;
      background: #ff4f87;
      transform: rotate(-45deg);
      box-shadow: 0 18px 45px rgba(255, 79, 135, 0.35);
      border-radius: 18px;
    }

    .heart-shape::before,
    .heart-shape::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 160px;
      background: #ff4f87;
      border-radius: 50%;
    }

    .heart-shape::before {
      top: -90px;
      left: 0;
    }

    .heart-shape::after {
      left: 90px;
      top: 0;
    }

    .heart-text {
      position: absolute;
      z-index: 4;
      color: white;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 1px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.18);
      user-select: none;
      line-height: 1.1;
      transform: translateY(-8px);
    }

    .letter {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.9);
      transition: opacity 0.8s ease, transform 0.8s ease;
      z-index: 1;
    }

    .paper {
      position: relative;
      width: 330px;
      height: 230px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 22px 60px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .paper::before,
    .paper::after {
      content: "";
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(145deg, #fff8fb, #ffe6ef);
      transition: transform 1s ease;
      z-index: 2;
    }

    .paper::before {
      left: 0;
      transform-origin: left center;
      clip-path: polygon(0 0, 100% 0, 82% 50%, 100% 100%, 0 100%);
      border-right: 1px solid rgba(255, 120, 160, 0.18);
    }

    .paper::after {
      right: 0;
      transform-origin: right center;
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 18% 50%);
      border-left: 1px solid rgba(255, 120, 160, 0.18);
    }

    .message {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px;
      font-size: 30px;
      font-weight: 700;
      line-height: 1.3;
      color: #d6336c;
      z-index: 1;
    }

    .hint {
      position: absolute;
      bottom: -44px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      color: #a53b61;
      opacity: 0.8;
      user-select: none;
    }

    .opened .heart-closed {
      opacity: 0;
      transform: scale(0.85) translateY(-12px);
      pointer-events: none;
    }

    .opened .letter {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .opened .paper::before {
      transform: rotateY(-135deg);
    }

    .opened .paper::after {
      transform: rotateY(135deg);
    }

    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .sparkles span {
      position: absolute;
      font-size: 18px;
      animation: sparkle 4s linear infinite;
      opacity: 0;
    }

    .sparkles span:nth-child(1) { left: 12%; top: 18%; animation-delay: 0s; }
    .sparkles span:nth-child(2) { left: 78%; top: 22%; animation-delay: 0.7s; }
    .sparkles span:nth-child(3) { left: 20%; top: 75%; animation-delay: 1.4s; }
    .sparkles span:nth-child(4) { left: 84%; top: 68%; animation-delay: 2.1s; }
    .sparkles span:nth-child(5) { left: 50%; top: 8%; animation-delay: 2.8s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes sparkle {
      0% { transform: translateY(10px) scale(0.7); opacity: 0; }
      20% { opacity: 1; }
      50% { transform: translateY(-10px) scale(1); opacity: 1; }
      100% { transform: translateY(-24px) scale(0.7); opacity: 0; }
    }

    @media (max-width: 480px) {
      .card-wrap {
        width: 290px;
        height: 300px;
      }

      .paper {
        width: 290px;
        height: 210px;
      }

      .message {
        font-size: 24px;
      }

      .heart-shape,
      .heart-shape::before,
      .heart-shape::after {
        width: 150px;
        height: 135px;
      }

      .heart-shape::before {
        top: -75px;
      }

      .heart-shape::after {
        left: 75px;
      }

      .heart-text {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="card-wrap" id="card">
      <div class="sparkles">
        <span>✨</span>
        <span>💖</span>
        <span>✨</span>
        <span>💌</span>
        <span>✨</span>
      </div>

      <div class="heart-closed">
        <div class="heart-shape"></div>
        <div class="heart-text">beni<br>aç</div>
      </div>

      <div class="letter">
        <div class="paper">
          <div class="message">bu hayat seninle daha anlamlı</div>
        </div>
      </div>

      <div class="hint">Kalbe tıkla 🤍</div>
    </div>
  </div>

  <script>
    const card = document.getElementById('card');
    card.addEventListener('click', () => {
      card.classList.toggle('opened');
    });
  </script>
</body>
</html>
