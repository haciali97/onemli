<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kağıt Kalp</title>
    <style>
        :root {
            --paper-color: #fce4ec;
            --paper-shadow: #f06292;
            --text-color: #880e4f;
            --bg-color: #fdfaf7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* The Grainy Paper Texture Filter */
        .paper-texture {
            filter: url(#paper-grain);
        }

        .heart-container {
            position: relative;
            width: 300px;
            height: 260px;
            cursor: pointer;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .heart-container:hover {
            transform: scale(1.02) rotate(-1deg);
        }

        /* Common styles for heart halves */
        .heart-half {
            position: absolute;
            width: 150px;
            height: 240px;
            background-color: var(--paper-color);
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center right;
            box-shadow: -5px 10px 20px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            backface-visibility: visible;
        }

        /* Left Half */
        .left {
            left: 0;
            border-radius: 150px 150px 0 150px;
            z-index: 2;
            border-right: 1px solid rgba(0,0,0,0.05); /* The fold line */
        }

        /* Right Half */
        .right {
            left: 150px;
            border-radius: 150px 150px 150px 0;
            transform-origin: center left;
            z-index: 2;
        }

        /* Crease effects */
        .heart-half::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%, rgba(0,0,0,0.02) 100%);
            pointer-events: none;
        }

        /* Text Styles */
        .instruction {
            position: absolute;
            width: 100%;
            text-align: center;
            bottom: -60px;
            color: var(--text-color);
            font-style: italic;
            opacity: 0.7;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: opacity 0.5s;
        }

        .label {
            color: var(--text-color);
            font-size: 1.2rem;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        .inner-message {
            position: absolute;
            width: 260px;
            text-align: center;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-color);
            font-size: 1.4rem;
            line-height: 1.5;
            opacity: 0;
            transition: opacity 1s delay 0.5s;
            z-index: 1;
            pointer-events: none;
        }

        /* Interaction State */
        .opened .left {
            transform: rotateY(-140deg);
        }

        .opened .right {
            transform: rotateY(140deg);
        }

        .opened .label, .opened .instruction {
            opacity: 0;
        }

        .opened .inner-message {
            opacity: 1;
        }

        /* Subtle Asymmetry */
        .left { transform: rotate(-1deg); }
        .right { transform: rotate(1deg) translateX(-2px); }

        /* Responsive */
        @media (max-width: 400px) {
            .heart-container { transform: scale(0.8); }
            .heart-container:hover { transform: scale(0.82); }
        }
    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="paper-grain">
            <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise" />
            <feDiffuseLighting in="noise" lighting-color="#fff" surfaceScale="2">
                <feDistantLight azimuth="45" elevation="35" />
            </feDiffuseLighting>
            <feComposite operator="in" in2="SourceGraphic" />
            <feBlend in="SourceGraphic" mode="multiply" />
        </filter>
        
        <filter id="edge-distortion">
            <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" />
        </filter>
    </svg>

    <div class="heart-container" id="heart">
        <div class="inner-message">
            seni 14 milyon 600 bin 800 kere seviyorum
        </div>
        
        <div class="heart-half left paper-texture" style="filter: url(#paper-grain) url(#edge-distortion);">
            <span class="label">beni</span>
        </div>
        <div class="heart-half right paper-texture" style="filter: url(#paper-grain) url(#edge-distortion);">
            <span class="label" style="margin-left: -70px;">aç</span>
        </div>

        <div class="instruction">dokun</div>
    </div>

    <script>
        const heart = document.getElementById('heart');
        
        heart.addEventListener('click', () => {
            heart.classList.toggle('opened');
        });
    </script>
</body>
</html>
