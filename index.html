<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beni Aç</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg1: #fbf2f4;
      --bg2: #f5dde3;
      --paper1: #edc0ca;
      --paper2: #e5aebb;
      --inside1: #f8dce3;
      --inside2: #f2c6d1;
      --line: rgba(120, 63, 78, 0.18);
      --crease: rgba(120, 63, 78, 0.14);
      --text: #7b4152;
      --shadow: rgba(109, 61, 75, 0.16);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,0.88), transparent 24%),
        radial-gradient(circle at 82% 8%, rgba(255,255,255,0.55), transparent 18%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow: hidden;
      font-family: Georgia, "Times New Roman", serif;
    }

    .scene {
      width: 100%;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrap {
      position: relative;
      width: min(92vw, 420px);
      height: min(92vh, 520px);
      display: grid;
      place-items: center;
      cursor: pointer;
      animation: float 4.6s ease-in-out infinite;
    }

    .heart-stage {
      position: relative;
      width: min(72vw, 290px);
      aspect-ratio: 1 / 1;
      filter: drop-shadow(0 22px 28px var(--shadow));
    }

    .heart-svg {
      position: absolute;
      inset: 0;
      overflow: visible;
    }

    .base-heart,
    .inside-heart,
    .left-flap,
    .right-flap {
      transition: transform 1s cubic-bezier(.22,.84,.24,1), opacity .8s ease;
      transform-box: fill-box;
      transform-origin: center;
    }

    .base-heart path,
    .left-flap path,
    .right-flap path,
    .inside-heart path {
      vector-effect: non-scaling-stroke;
    }

    .inside-heart {
      opacity: .82;
      transform: scale(.90);
    }

    .label,
    .message {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 54px;
      color: var(--text);
      z-index: 4;
      user-select: none;
      text-shadow: 0 1px 0 rgba(255,255,255,.35);
    }

    .label {
      font-size: clamp(28px, 5vw, 38px);
      font-weight: 700;
      letter-spacing: .3px;
      transition: opacity .45s ease;
    }

    .message {
      font-size: clamp(22px, 4.1vw, 30px);
      line-height: 1.32;
      font-weight: 700;
      opacity: 0;
      transform: scale(.86);
      transition: opacity .85s ease .12s, transform 1s cubic-bezier(.22,.84,.24,1) .12s;
    }

    .hint {
      position: absolute;
      bottom: 18px;
      width: 100%;
      text-align: center;
      color: #986271;
      font-size: 14px;
      letter-spacing: .2px;
      user-select: none;
    }

    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .sparkles span {
      position: absolute;
      color: rgba(123,65,82,.58);
      font-size: 14px;
      opacity: 0;
      animation: sparkle 5s linear infinite;
    }

    .sparkles span:nth-child(1) { top: 78px; left: 38px; animation-delay: 0s; }
    .sparkles span:nth-child(2) { top: 76px; right: 42px; animation-delay: 1.1s; }
    .sparkles span:nth-child(3) { bottom: 98px; left: 28px; animation-delay: 2.2s; }
    .sparkles span:nth-child(4) { bottom: 94px; right: 38px; animation-delay: 3.3s; }

    .opened .label { opacity: 0; }
    .opened .message {
      opacity: 1;
      transform: scale(1);
    }

    .opened .inside-heart {
      opacity: 1;
      transform: scale(.96) translateY(3px);
    }

    .opened .left-flap {
      transform: rotate(-12deg) translate(-10px, -4px);
    }

    .opened .right-flap {
      transform: rotate(12deg) translate(10px, -4px);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes sparkle {
      0% { opacity: 0; transform: translateY(10px) scale(.68); }
      18% { opacity: .9; }
      58% { opacity: .9; transform: translateY(-7px) scale(1); }
      100% { opacity: 0; transform: translateY(-18px) scale(.74); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="wrap" id="card" aria-label="Kalp mektup">
      <div class="sparkles">
        <span>✦</span>
        <span>✧</span>
        <span>✦</span>
        <span>✧</span>
      </div>

      <div class="heart-stage">
        <svg class="heart-svg" viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="paperGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#efc7d0"/>
              <stop offset="100%" stop-color="#e5aebb"/>
            </linearGradient>
            <linearGradient id="insideGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#f9e1e7"/>
              <stop offset="100%" stop-color="#f2c7d2"/>
            </linearGradient>
            <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
              <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="7"/>
              <feColorMatrix type="saturate" values="0"/>
              <feComponentTransfer>
                <feFuncA type="table" tableValues="0 0 .05 .08"/>
              </feComponentTransfer>
            </filter>
            <clipPath id="heartClip">
              <path d="M150 255
                       C132 240, 72 196, 38 146
                       C10 106, 20 55, 63 36
                       C98 20, 128 32, 150 58
                       C172 32, 202 20, 237 36
                       C280 55, 290 106, 262 146
                       C228 196, 168 240, 150 255Z"/>
            </clipPath>
          </defs>

          <g class="inside-heart">
            <path d="M150 243
                     C134 230, 82 191, 53 149
                     C29 114, 36 69, 72 53
                     C101 40, 127 52, 150 76
                     C173 52, 199 40, 228 53
                     C264 69, 271 114, 247 149
                     C218 191, 166 230, 150 243Z"
                  fill="url(#insideGrad)"
                  stroke="rgba(120,63,78,0.10)"
                  stroke-width="1.2"/>
            <g clip-path="url(#heartClip)" opacity=".9">
              <line x1="150" y1="52" x2="150" y2="228" stroke="rgba(120,63,78,0.14)" stroke-width="1.6"/>
              <line x1="61" y1="140" x2="239" y2="140" stroke="rgba(120,63,78,0.13)" stroke-width="1.4"/>
            </g>
          </g>

          <g class="base-heart">
            <path d="M150 255
                     C132 240, 72 196, 38 146
                     C10 106, 20 55, 63 36
                     C98 20, 128 32, 150 58
                     C172 32, 202 20, 237 36
                     C280 55, 290 106, 262 146
                     C228 196, 168 240, 150 255Z"
                  fill="url(#paperGrad)"
                  stroke="rgba(120,63,78,0.16)"
                  stroke-width="1.2"/>
            <g clip-path="url(#heartClip)">
              <rect x="0" y="0" width="300" height="280" filter="url(#paperNoise)"/>
              <path d="M56 94 C93 76, 122 79, 149 108" fill="none" stroke="rgba(255,255,255,.16)" stroke-width="2" stroke-linecap="round"/>
              <path d="M188 84 C210 87, 229 98, 241 116" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="2" stroke-linecap="round"/>
              <ellipse cx="103" cy="114" rx="13" ry="7" fill="rgba(125,70,86,0.06)" transform="rotate(-18 103 114)"/>
              <ellipse cx="193" cy="128" rx="10" ry="16" fill="rgba(125,70,86,0.05)" transform="rotate(21 193 128)"/>
              <ellipse cx="134" cy="182" rx="17" ry="6" fill="rgba(125,70,86,0.05)" transform="rotate(-20 134 182)"/>
            </g>
          </g>

          <g class="left-flap">
            <path d="M150 58
                     C126 32, 98 20, 63 36
                     C20 55, 10 106, 38 146
                     C59 176, 90 205, 123 228
                     C118 197, 114 172, 112 145
                     C110 117, 123 85, 150 58Z"
                  fill="url(#paperGrad)"
                  stroke="rgba(120,63,78,0.16)"
                  stroke-width="1.2"/>
            <path d="M149 58 C128 78, 118 104, 117 140 C116 166, 120 190, 125 224"
                  fill="none" stroke="rgba(120,63,78,0.12)" stroke-width="1.5" stroke-linecap="round"/>
          </g>

          <g class="right-flap">
            <path d="M150 58
                     C174 32, 202 20, 237 36
                     C280 55, 290 106, 262 146
                     C241 176, 210 205, 177 228
                     C182 197, 186 172, 188 145
                     C190 117, 177 85, 150 58Z"
                  fill="url(#paperGrad)"
                  stroke="rgba(120,63,78,0.16)"
                  stroke-width="1.2"/>
            <path d="M151 58 C172 78, 182 104, 183 140 C184 166, 180 190, 175 224"
                  fill="none" stroke="rgba(120,63,78,0.12)" stroke-width="1.5" stroke-linecap="round"/>
          </g>
        </svg>

        <div class="label">beni aç</div>
        <div class="message">seni 14 milyon 600 bin 800 kere seviyorum</div>
      </div>

      <div class="hint">Kalbe tıkla</div>
    </div>
  </div>

  <script>
    const card = document.getElementById('card');
    card.addEventListener('click', () => {
      card.classList.toggle('opened');
    });
  </script>
</body>
</html>
